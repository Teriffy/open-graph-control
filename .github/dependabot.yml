version: 2
updates:
  - package-ecosystem: composer
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'Europe/Prague'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'deps(composer)'
      include: scope

  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'Europe/Prague'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'deps(npm)'
      include: scope
    groups:
      wordpress:
        patterns:
          - '@wordpress/*'

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    commit-message:
      prefix: 'deps(actions)'

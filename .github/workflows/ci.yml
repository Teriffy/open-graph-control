name: CI
on:
  push:
    branches: [main]
  pull_request:

env:
  # Opt into Node 24 runtime for JavaScript-based actions (checkout, setup-node, ...)
  # ahead of the September 2026 forced upgrade.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  php:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - run: composer install --no-progress --no-interaction
      - run: composer stan
      - run: composer cs
      - run: composer test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: pcov
      - run: composer install --no-progress --no-interaction
      - run: composer coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/html/
          retention-days: 7

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install --no-audit --no-fund --prefer-offline
      - run: npm run lint:js
      - run: npm run build

  plugin-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build production plugin zip
        run: |
          npm install --no-audit --no-fund --prefer-offline
          npm run build
      - uses: WordPress/plugin-check-action@v1
        with:
          build-dir: './'
          exclude-directories: 'node_modules,tests,docs,bin,.github,.wordpress-org,.superpowers,assets/admin'
          categories: 'plugin_repo,security,performance,accessibility,general'

name: Release to WordPress.org

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: ubuntu-latest
    if: startsWith( github.ref, 'refs/tags/v' )
    # softprops/action-gh-release needs `contents: write` to POST the
    # release object; the default workflow token only grants read.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build dist zip
        run: bash bin/make-dist.sh

      - name: Attach zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/open-graph-control-*.zip
          generate_release_notes: true

      - name: Deploy to WordPress.org SVN
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.WP_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WP_SVN_PASSWORD }}
          SLUG: open-graph-control
          ASSETS_DIR: .wordpress-org
          BUILD_DIR: dist/open-graph-control
        if: ${{ env.WP_SVN_USERNAME != '' }}
